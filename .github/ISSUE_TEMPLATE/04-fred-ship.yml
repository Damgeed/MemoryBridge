name: "🚀 Fred's Ship — Sprint Task"
description: "A concrete task that needs doing. Let's ship it."
title: "ship: "
labels: ["fred/ship"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Clear task, clear scope, ship it.
  - type: textarea
    id: task
    attributes:
      label: Task
      description: One sentence describing what needs to be done
      placeholder: "Add API key authentication middleware"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Middleware checks `Authorization: Bearer <key>` header
        - [ ] Missing/invalid key returns 401
        - [ ] Tests pass
        - [ ] Smoke test updated
    validations:
      required: true
  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - Current sprint
        - Next sprint
        - Backlog
    validations:
      required: true
  - type: input
    id: depends
    attributes:
      label: Depends on
      description: Issue numbers this blocks or is blocked by
      placeholder: "#42, #87"
    validations:
      required: false
