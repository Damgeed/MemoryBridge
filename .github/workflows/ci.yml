name: Memory Bridge CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # 👈 lets you run it manually from github.com

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (42 test suite)
        run: pytest tests/ -v --tb=short

      - name: Start server for smoke test
        run: |
          MEMORY_BRIDGE_API_KEY="ci-test-key" uvicorn memory_bridge.main:app --host 0.0.0.0 --port 8000 &
          sleep 2
          curl -s http://localhost:8000/health

      - name: Run smoke test
        env:
          MEMORY_BRIDGE_API_KEY: "ci-test-key"
        run: bash smoke_test.sh http://localhost:8000
