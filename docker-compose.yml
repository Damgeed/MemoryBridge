version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memory_bridge
      POSTGRES_USER: mb
      POSTGRES_PASSWORD: mb_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mb -d memory_bridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MEMORY_BRIDGE_DATABASE_URL: postgres://mb:mb_dev@postgres/memory_bridge
      MEMORY_BRIDGE_USE_SQLITE: "false"
      MEMORY_BRIDGE_REDIS_URL: redis://redis:6379
      MEMORY_BRIDGE_JWT_SECRET: dev-jwt-secret-not-for-production
      MEMORY_BRIDGE_API_KEY: dev-admin-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
