<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="p-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="t-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="64" cy="64" r="56" fill="#a78bfa" opacity="0.06"/>

  <!-- Left module — tilted hexagon (purple) -->
  <polygon points="40,36 64,22 88,36 88,68 64,82 40,68" fill="url(#p-grad)" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
  <polygon points="40,36 58,26 82,36 82,60 64,70 40,60" fill="url(#p-grad)"/>

  <!-- Right module — tilted hexagon (teal) -->
  <polygon points="40,78 64,64 88,78 88,110 64,124 40,110" fill="url(#t-grad)" stroke="#34d399" stroke-width="1" opacity="0.15"/>
  <polygon points="46,76 64,66 82,76 82,98 64,108 46,98" fill="url(#t-grad)"/>

  <!-- Connection channels — flowing data between modules -->
  <line x1="60" y1="68" x2="56" y2="76" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="68" x2="72" y2="76" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Center bridge node — shared memory point -->
  <circle cx="64" cy="76" r="5" fill="#fff"/>
  <circle cx="64" cy="76" r="3" fill="url(#flow-grad)"/>
  <circle cx="64" cy="76" r="8" fill="none" stroke="url(#flow-grad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Data flow dots -->
  <circle cx="50" cy="50" r="2" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="56" cy="44" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="72" cy="48" r="2" fill="#34d399" opacity="0.8"/>
  <circle cx="66" cy="54" r="1.5" fill="#34d399" opacity="0.6"/>

  <!-- Highlight glints -->
  <ellipse cx="54" cy="32" rx="6" ry="3" fill="#fff" opacity="0.15" transform="rotate(-30,54,32)"/>
  <ellipse cx="54" cy="86" rx="6" ry="3" fill="#fff" opacity="0.15" transform="rotate(-30,54,86)"/>
</svg>