<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#8b7cf7"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bridge-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b7cf7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Subtle outer glow halo -->
  <circle cx="64" cy="56" r="54" fill="url(#g1)" opacity="0.06"/>

  <!-- Left node (purple) — simplified bold circle -->
  <circle cx="38" cy="44" r="26" fill="url(#g1)"/>
  <circle cx="38" cy="44" r="26" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.12"/>

  <!-- Right node (teal) — simplified bold circle -->
  <circle cx="90" cy="44" r="26" fill="url(#g2)"/>
  <circle cx="90" cy="44" r="26" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.12"/>

  <!-- Bridge connection (thick, bold) -->
  <path d="M 26 68 Q 64 92 102 68" fill="none" stroke="url(#bridge-g)" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

  <!-- Pillar support lines -->
  <line x1="48" y1="52" x2="48" y2="72" stroke="#6c5ce7" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="52" x2="80" y2="72" stroke="#06d6a0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Data flow dots on the bridge arc -->
  <circle cx="56" cy="74" r="4" fill="#8b7cf7" opacity="0.7"/>
  <circle cx="64" cy="76" r="4" fill="#7c3aed" opacity="0.9"/>
  <circle cx="72" cy="74" r="4" fill="#34d399" opacity="0.7"/>

  <!-- Minimal inner node accents (just a thin ring, no brain icon — cleaner at small sizes) -->
  <circle cx="38" cy="44" r="14" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.15"/>
  <circle cx="90" cy="44" r="14" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.15"/>

  <!-- Subtle highlight on nodes -->
  <ellipse cx="30" cy="36" rx="8" ry="5" fill="#fff" opacity="0.08" transform="rotate(-20,30,36)"/>
  <ellipse cx="82" cy="36" rx="8" ry="5" fill="#fff" opacity="0.08" transform="rotate(-20,82,36)"/>
</svg>
