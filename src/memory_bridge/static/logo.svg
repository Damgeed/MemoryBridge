<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bridge-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="connector" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background circle (subtle glow) -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="url(#bridge-g)" stroke-width="0.5" opacity="0.15"/>

  <!-- Connecting bridge path (bottom arc — data flow) -->
  <path d="M 32 78 Q 64 100 96 78" fill="none" stroke="url(#connector)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bridge road (the connection between agents) -->
  <rect x="24" y="56" width="80" height="6" rx="3" fill="url(#bridge-g)" opacity="0.85"/>

  <!-- Pillars/legs of the bridge -->
  <rect x="40" y="44" width="5" height="18" rx="2.5" fill="url(#g1)" opacity="0.7"/>
  <rect x="83" y="44" width="5" height="18" rx="2.5" fill="url(#g2)" opacity="0.7"/>

  <!-- Left agent node (Purple — Henry / knowledge) -->
  <circle cx="32" cy="38" r="22" fill="url(#g1)"/>
  <circle cx="32" cy="38" r="22" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
  
  <!-- Brain/memory icon inside left node -->
  <g transform="translate(32,38)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M-8 -2 Q-10 -8 -6 -12 Q-2 -14 0 -12 Q2 -14 6 -12 Q10 -8 8 -2"/>
    <path d="M-8 -2 Q-10 2 -6 6 Q-2 8 0 6 Q2 8 6 6 Q10 2 8 -2"/>
    <line x1="0" y1="-14" x2="0" y2="-10"/>
    <line x1="0" y1="10" x2="0" y2="6"/>
    <circle cx="-5" cy="-2" r="1" fill="#fff"/>
    <circle cx="5" cy="-2" r="1" fill="#fff"/>
    <circle cx="-5" cy="2" r="1" fill="#fff"/>
    <circle cx="5" cy="2" r="1" fill="#fff"/>
    <circle cx="0" cy="0" r="1" fill="#fff"/>
  </g>

  <!-- Right agent node (Green — Fred / execution) -->
  <circle cx="96" cy="38" r="22" fill="url(#g2)"/>
  <circle cx="96" cy="38" r="22" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
  
  <!-- Brain/memory icon inside right node -->
  <g transform="translate(96,38)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M-8 -2 Q-10 -8 -6 -12 Q-2 -14 0 -12 Q2 -14 6 -12 Q10 -8 8 -2"/>
    <path d="M-8 -2 Q-10 2 -6 6 Q-2 8 0 6 Q2 8 6 6 Q10 2 8 -2"/>
    <line x1="0" y1="-14" x2="0" y2="-10"/>
    <line x1="0" y1="10" x2="0" y2="6"/>
    <circle cx="-5" cy="-2" r="1" fill="#fff"/>
    <circle cx="5" cy="-2" r="1" fill="#fff"/>
    <circle cx="-5" cy="2" r="1" fill="#fff"/>
    <circle cx="5" cy="2" r="1" fill="#fff"/>
    <circle cx="0" cy="0" r="1" fill="#fff"/>
  </g>

  <!-- Memory nodes stored on the bridge (data packets flowing) -->
  <circle cx="52" cy="62" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="64" cy="59" r="3" fill="#6c5ce7" opacity="0.8"/>
  <circle cx="76" cy="62" r="3" fill="#34d399" opacity="0.6"/>

  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="url(#bridge-g)" stroke-width="0.5" opacity="0.08"/>
</svg>
