<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" />
  <!-- Brain icon -->
  <g transform="translate(256,256)" fill="white">
    <!-- Left hemisphere -->
    <path d="M-80,-40 C-120,-60 -140,-20 -120,10 C-140,30 -120,70 -80,60 C-90,80 -60,100 -40,80 C-20,100 0,90 0,70 C20,90 40,100 60,80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Right hemisphere -->
    <path d="M80,-40 C120,-60 140,-20 120,10 C140,30 120,70 80,60 C90,80 60,100 40,80 C20,100 0,90 0,70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Center line -->
    <line x1="0" y1="-80" x2="0" y2="70" stroke="white" stroke-width="4" stroke-dasharray="8,4"/>
    <!-- Connection dots -->
    <circle cx="-30" cy="-30" r="6" fill="#58a6ff"/>
    <circle cx="30" cy="-30" r="6" fill="#3fb950"/>
    <circle cx="0" cy="10" r="6" fill="#d29922"/>
    <circle cx="-40" cy="20" r="6" fill="#bc8cff"/>
    <circle cx="40" cy="20" r="6" fill="#f0883e"/>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="700" fill="white">Memory Bridge</text>
</svg>
