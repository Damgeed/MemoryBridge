<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge — Memory Graph</title>
    <link rel="icon" href="/playground/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/playground/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto;
            height: 100vh;
        }

        .graph-toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 1.5rem;
            background: var(--bg-glass-strong);
            backdrop-filter: blur(16px) saturate(1.5);
            border-bottom: 1px solid var(--border-subtle);
            height: 56px;
        }
        .graph-toolbar h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .graph-toolbar input {
            background: var(--input-bg);
            border: 1px solid var(--border-primary);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
            flex: 1;
            max-width: 300px;
            outline: none;
            transition: border-color var(--transition-fast);
            font-family: var(--font-sans);
        }
        .graph-toolbar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .graph-toolbar input::placeholder { color: var(--text-faint); }

        .graph-legend {
            display: flex;
            gap: 1rem;
            font-size: 0.78rem;
            margin-left: auto;
        }
        .graph-legend span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-muted);
        }

        #graph {
            width: 100vw;
            height: calc(100vh - 56px);
            position: relative;
            background: var(--bg-primary);
        }
        #graph svg { width: 100%; height: 100%; display: block; }

        .graph-tooltip {
            position: absolute;
            background: var(--bg-glass-strong);
            backdrop-filter: blur(16px) saturate(1.5);
            border: 1px solid var(--border-primary);
            padding: 0.65rem 0.9rem;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            line-height: 1.5;
            pointer-events: none;
            display: none;
            z-index: 100;
            max-width: 280px;
            box-shadow: var(--shadow-lg);
            color: var(--text-primary);
        }
        .graph-tooltip strong { color: var(--text-primary); }
        .graph-tooltip .tt-label { color: var(--text-muted); font-size: 0.72rem; }

        .node {
            cursor: pointer;
            stroke: var(--bg-primary);
            stroke-width: 1.5px;
            transition: stroke-width 0.1s;
        }
        .node:hover {
            stroke: var(--accent);
            stroke-width: 2.5px;
        }
        .node.highlighted { stroke: var(--accent); stroke-width: 2.5px; }
        .node.dimmed { opacity: 0.15; }

        .link {
            stroke: var(--border-primary);
            stroke-opacity: 0.5;
            stroke-width: 1px;
        }
        .link.highlighted {
            stroke: var(--accent);
            stroke-opacity: 0.8;
            stroke-width: 1.5px;
        }
        .link.dimmed { stroke-opacity: 0.05; }

        .label {
            font-size: 10px;
            fill: var(--text-muted);
            pointer-events: none;
            font-family: var(--font-sans);
        }
        .label.dimmed { opacity: 0.2; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-faint);
        }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-muted); }
        .empty-state p { font-size: 0.9rem; }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 0.9rem;
            gap: 0.75rem;
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .error-state h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--red); }
        .error-state p { font-size: 0.9rem; color: var(--text-muted); }

        @media (max-width: 640px) {
            .graph-toolbar { flex-wrap: wrap; height: auto; padding: 0.4rem 0.75rem; gap: 0.4rem; }
            .graph-toolbar input { max-width: 100%; }
            .graph-legend { margin-left: 0; flex-wrap: wrap; gap: 0.4rem; font-size: 0.7rem; }
            #graph { height: calc(100vh - 100px); }
        }
        @media (max-width: 480px) {
            .graph-toolbar { padding: 0.3rem 0.5rem; }
            .graph-toolbar h2 { font-size: 0.85rem; }
            .graph-toolbar input { font-size: 0.75rem; padding: 0.3rem 0.5rem; }
        }
    </style>
    <script src="/playground/i18n.js"></script>
</head>

    <script>
        // ── Theme ──────────────────────────────────────────────────
        (function initTheme() {
            const saved = localStorage.getItem('mb-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
            updateThemeIcons();
        })();
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('mb-theme', next);
            updateThemeIcons();
        }
        function updateThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme');
            const isDark = theme === 'dark';
            document.querySelectorAll('.theme-toggle-btn').forEach(btn => {
                const sun = btn.querySelector('.theme-sun');
                const moon = btn.querySelector('.theme-moon');
                if (sun) sun.style.display = isDark ? 'block' : 'none';
                if (moon) moon.style.display = isDark ? 'none' : 'block';
            });
        }

        // ── Mobile Nav ───────────────────────────────────────────
        function toggleMobileNav() {
            const panel = document.getElementById('nav-mobile');
            const backdrop = document.getElementById('nav-backdrop');
            const isOpen = panel.classList.toggle('open');
            backdrop.classList.toggle('open');
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }
        function closeMobileNav() {
            const panel = document.getElementById('nav-mobile');
            const backdrop = document.getElementById('nav-backdrop');
            if (panel) panel.classList.remove('open');
            if (backdrop) backdrop.classList.remove('open');
            document.body.style.overflow = '';
        }

        // ── Configuration ─────────────────────────────────────────
        const COLORS = {
            memory:  '#a78bfa',
            session: '#34d399',
            agent:   '#f59e0b',
            tag:     '#c084fc',
        };

        const API_ENDPOINT = '/graph/data';

        let svg, g, simulation, linkElements, nodeElements, labelElements;
        let graphData = null;

        // ── Load Data ─────────────────────────────────────────────
        async function loadGraph() {
            const container = document.getElementById('graph');

            try {
                const params = new URLSearchParams(window.location.search);
                const limit = params.get('limit') || '200';
                const sessionId = params.get('session_id') || '';
                const project = params.get('project') || '';

                let url = `${API_ENDPOINT}?limit=${limit}`;
                if (sessionId) url += `&session_id=${encodeURIComponent(sessionId)}`;
                if (project)   url += `&project=${encodeURIComponent(project)}`;

                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

                graphData = await response.json();

                if (!graphData.nodes || graphData.nodes.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3 data-i18n="graph.empty">No memories found</h3>
                            <p data-i18n="graph.empty_desc">Create some memories first, then visit this page.</p>
                        </div>`;
                    return;
                }

                renderGraph(graphData);
            } catch (e) {
                container.innerHTML = '';
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-state';
                errorDiv.innerHTML = '<h3>⚠️ Failed to load graph</h3>';
                const p = errorDiv.appendChild(document.createElement('p'));
                p.textContent = e.message || 'Unknown error';
                container.appendChild(errorDiv);
            }
        }

        // ── Render D3 Force-Directed Graph ────────────────────────
        function renderGraph(data) {
            const container = document.getElementById('graph');
            container.innerHTML = '';

            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .append('svg')
                .attr('width', width)
                .attr('height', height);

            const zoom = d3.zoom()
                .scaleExtent([0.1, 5])
                .on('zoom', (event) => { g.attr('transform', event.transform); });

            svg.call(zoom);
            g = svg.append('g');

            linkElements = g.selectAll('line')
                .data(data.edges)
                .join('line')
                .attr('class', 'link');

            nodeElements = g.selectAll('circle')
                .data(data.nodes)
                .join('circle')
                .attr('class', 'node')
                .attr('r', d => d.type === 'session' ? 10 : d.type === 'agent' ? 9 : 7)
                .attr('fill', d => COLORS[d.type] || '#888')
                .call(d3.drag()
                    .on('start', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                    .on('end', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    })
                );

            labelElements = g.selectAll('text')
                .data(data.nodes)
                .join('text')
                .text(d => d.label)
                .attr('class', 'label')
                .attr('dx', d => d.type === 'memory' ? 10 : 12)
                .attr('dy', 4);

            const tooltip = d3.select('#tooltip');
            const tooltipEl = document.getElementById('tooltip');

            nodeElements
                .on('mouseover', (event, d) => {
                    // Safe tooltip construction — text() escapes HTML
                    tooltip.selectAll('*').remove();
                    tooltip.style('display', 'block');
                    const strong = tooltip.append('strong');
                    strong.text(d.label || '');
                    tooltip.append('br');
                    tooltip.append('span').attr('class', 'tt-label').text('Type: ');
                    tooltip.append('span').text(d.type || '');
                    if (d.key) {
                        tooltip.append('br');
                        tooltip.append('span').attr('class', 'tt-label').text('Key: ');
                        tooltip.append('span').text(d.key);
                    }
                    if (d.tags && d.tags.length > 0) {
                        tooltip.append('br');
                        tooltip.append('span').attr('class', 'tt-label').text('Tags: ');
                        tooltip.append('span').text(d.tags.join(', '));
                    }
                })
                .on('mousemove', (event) => {
                    const x = event.pageX + 14;
                    const y = event.pageY - 10;
                    const tw = tooltipEl.offsetWidth || 200;
                    const th = tooltipEl.offsetHeight || 100;
                    tooltip
                        .style('left', (x + tw > window.innerWidth ? event.pageX - tw - 14 : x) + 'px')
                        .style('top', (y + th > window.innerHeight ? event.pageY - th - 10 : y) + 'px');
                })
                .on('mouseout', () => { tooltip.style('display', 'none'); });

            simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.edges)
                    .id(d => d.id)
                    .distance(d => d.type === 'tagged' ? 30 : 50)
                    .strength(0.6)
                )
                .force('charge', d3.forceManyBody()
                    .strength(d => d.type === 'session' ? -120 : d.type === 'agent' ? -100 : -60)
                )
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(6))
                .alphaDecay(0.08)
                .on('tick', () => {
                    linkElements
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);
                    nodeElements.attr('cx', d => d.x).attr('cy', d => d.y);
                    labelElements.attr('x', d => d.x).attr('y', d => d.y);
                });

            setTimeout(() => {
                const bounds = g.node()?.getBBox();
                if (bounds && bounds.width > 0 && bounds.height > 0) {
                    const scale = Math.min(width / (bounds.width + 100), height / (bounds.height + 100), 1.5);
                    const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
                    const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
                    svg.transition().duration(500).call(
                        zoom.transform,
                        d3.zoomIdentity.translate(tx, ty).scale(scale)
                    );
                }
            }, 100);
        }

        // ── Filter Nodes ──────────────────────────────────────────
        function filterNodes() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            if (!graphData || !graphData.nodes) return;

            if (!query) {
                nodeElements.classed('dimmed highlighted', false);
                linkElements.classed('dimmed highlighted', false);
                labelElements.classed('dimmed', false);
                return;
            }

            const matchIds = new Set();
            graphData.nodes.forEach(d => {
                if (d.label.toLowerCase().includes(query) ||
                    (d.key && d.key.toLowerCase().includes(query)) ||
                    (d.type && d.type.includes(query))) {
                    matchIds.add(d.id);
                }
            });

            const connectedIds = new Set(matchIds);
            graphData.edges.forEach(e => {
                const sId = typeof e.source === 'object' ? e.source.id : e.source;
                const tId = typeof e.target === 'object' ? e.target.id : e.target;
                if (matchIds.has(sId)) connectedIds.add(tId);
                if (matchIds.has(tId)) connectedIds.add(sId);
            });

            nodeElements
                .classed('dimmed', d => !connectedIds.has(d.id))
                .classed('highlighted', d => matchIds.has(d.id));
            linkElements
                .classed('dimmed', d => {
                    const sId = typeof d.source === 'object' ? d.source.id : d.source;
                    const tId = typeof d.target === 'object' ? d.target.id : d.target;
                    return !(connectedIds.has(sId) && connectedIds.has(tId));
                })
                .classed('highlighted', d => {
                    const sId = typeof d.source === 'object' ? d.source.id : d.source;
                    const tId = typeof d.target === 'object' ? d.target.id : d.target;
                    return matchIds.has(sId) && matchIds.has(tId);
                });
            labelElements.classed('dimmed', d => !connectedIds.has(d.id));
        }

        // ── Handle Resize ─────────────────────────────────────────
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (graphData) {
                    const container = document.getElementById('graph');
                    const width = container.clientWidth;
                    const height = container.clientHeight;
                    svg.attr('width', width).attr('height', height);
                    simulation.force('center', d3.forceCenter(width / 2, height / 2));
                    simulation.alpha(0.3).restart();
                }
            }, 200);
        });

        // ── Keyboard shortcut ─────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('search').focus();
            }
        });

        // ── Language Selector ─────────────────────────────────────
        function toggleLang() {
            document.getElementById('lang-dropdown').classList.toggle('open');
        }
        function toggleLangMobile() {
            document.getElementById('lang-dropdown-mobile').classList.toggle('open');
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.lang-toggle') && !e.target.closest('#lang-dropdown')) {
                document.getElementById('lang-dropdown')?.classList.remove('open');
            }
            if (!e.target.closest('#lang-dropdown-mobile') && !e.target.closest('[onclick="toggleLangMobile()"]')) {
                document.getElementById('lang-dropdown-mobile')?.classList.remove('open');
            }
        });
        function setLang(code) {
            localStorage.setItem('mb-lang', code);
            document.querySelectorAll('.lang-opt').forEach(el => el.classList.remove('active'));
            const opt = document.querySelector(`.lang-opt[data-lang="${code}"]`);
            if (opt) opt.classList.add('active');
            applyTranslations();
            document.getElementById('lang-dropdown').classList.remove('open');
            document.getElementById('lang-dropdown-mobile')?.classList.remove('open');
        }
        (function initLang() {
            initLanguage();
        })();

        // ── Load Graph ───────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', loadGraph);
    </script>
</body>
</html>
