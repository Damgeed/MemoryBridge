<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Bridge — Demo</title>
<link rel="icon" href="/playground/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="/playground/style.css">
<script src="/playground/i18n.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2a;
    --text: #e2e2ee;
    --muted: #6c7086;
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --green: #4ade80;
    --pink: #e879f9;
    --orange: #fb923c;
    --blue: #60a5fa;
    --font: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
  }
  [data-theme="light"] {
    --bg: #f5f5fa;
    --card: #ffffff;
    --border: #d4d4e0;
    --text: #1a1a2e;
    --muted: #6b6b80;
    --accent: #6d4cf5;
    --accent2: #8b6cf5;
    --green: #22c55e;
    --pink: #d946ef;
    --orange: #ea580c;
    --blue: #3b82f6;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* Main area */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left panel - terminal/logs */
  .left {
    flex: 1;
    padding: 1.2rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .left::-webkit-scrollbar { width: 6px; }
  .left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Right panel - diagram */
  .right {
    width: 45%;
    min-width: 320px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
  }

  /* Terminal log entry */
  .log {
    font-family: var(--font);
    font-size: 0.82rem;
    line-height: 1.6;
    padding: 0.5rem 0.7rem;
    border-radius: 6px;
    background: rgba(30,30,42,0.5);
    border-left: 3px solid transparent;
    opacity: 0;
    transform: translateY(8px);
    animation: logIn 0.4s ease forwards;
  }
  .log.henry { border-left-color: var(--blue); }
  .log.nova { border-left-color: var(--pink); }
  .log.rex { border-left-color: var(--orange); }
  .log.fred { border-left-color: var(--green); }
  .log.system { border-left-color: var(--accent); }
  .log .agent {
    display: inline-block;
    font-weight: 700;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-right: 0.4rem;
  }
  .log.henry .agent { background: rgba(96,165,250,0.2); color: var(--blue); }
  .log.nova .agent { background: rgba(232,121,249,0.2); color: var(--pink); }
  .log.rex .agent { background: rgba(251,146,60,0.2); color: var(--orange); }
  .log.fred .agent { background: rgba(74,222,128,0.2); color: var(--green); }
  .log.system .agent { background: rgba(124,92,252,0.2); color: var(--accent); }
  .log .arrow { color: var(--muted); font-size: 0.7rem; }
  .log .key { color: var(--accent2); }
  .log .val { color: var(--text); }
  .log .status-good { color: var(--green); }
  .log .status-warn { color: var(--orange); }

  @keyframes logIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Right panel - diagram elements */
  .diagram {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .agent-node {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.72rem;
    position: absolute;
    transition: all 0.6s ease;
    opacity: 0;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }
  .agent-node.show { opacity: 1; }
  .agent-node .emoji { font-size: 1.5rem; }
  .agent-node.henry { background: linear-gradient(135deg, #1e3a5f, #2563eb); color: var(--blue); top: 5%; left: 10%; }
  .agent-node.nova { background: linear-gradient(135deg, #4a1d6b, #a21caf); color: var(--pink); top: 5%; right: 10%; }
  .agent-node.rex { background: linear-gradient(135deg, #5c3d1e, #d97706); color: var(--orange); bottom: 15%; left: 5%; }
  .agent-node.fred { background: linear-gradient(135deg, #1a4731, #16a34a); color: var(--green); bottom: 15%; right: 5%; }

  /* Center database */
  .db-node {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    position: absolute;
    box-shadow: 0 0 40px rgba(124,92,252,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(124,92,252,0.2); }
    50% { box-shadow: 0 0 60px rgba(124,92,252,0.5); }
  }

  /* Connection lines */
  .conn {
    position: absolute;
    border: 1px dashed rgba(124,92,252,0.2);
    opacity: 0;
    transition: opacity 0.5s;
  }
  .conn.show { opacity: 1; }

  /* Labels on connections */
  .flow-label {
    font-size: 0.65rem;
    color: var(--muted);
    position: absolute;
    font-family: var(--font);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .flow-label.show { opacity: 1; }

  /* Step indicator */
  .step-indicator {
    position: absolute;
    top: 1rem;
    right: 1rem;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: var(--font);
  }

  /* Play / pause controls */
  .controls {
    position: absolute;
    bottom: 1rem;
    display: flex;
    gap: 0.5rem;
  }
  .controls button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.35rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.72rem;
    transition: all 0.2s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }

  /* Memory card floating from center */
  .mem-card {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    font-size: 0.68rem;
    font-family: var(--font);
    max-width: 180px;
    opacity: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .mem-card.show { opacity: 1; }

  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .right { width: 100%; min-width: unset; height: 45vh; border-left: none; border-top: 1px solid var(--border); }
    .left { height: 55vh; }
    .agent-node { width: 60px; height: 60px; font-size: 0.6rem; }
    .agent-node .emoji { font-size: 1.1rem; }
    .db-node { width: 80px; height: 80px; font-size: 1.6rem; }
  }
</style>

<script>
// ── Theme ──────────────────────────────────────────────
(function initDemoTheme() {
  const saved = localStorage.getItem('mb-theme');
  const html = document.documentElement;
  if (saved) html.setAttribute('data-theme', saved);
  else {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  }
})();
function toggleDemoTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('mb-theme', next);
}

// ── Mobile Nav ─────────────────────────────────────────
function toggleMobileNav() {
  document.getElementById('nav-backdrop').classList.toggle('open');
  document.getElementById('nav-mobile').classList.toggle('open');
  document.body.style.overflow = document.getElementById('nav-mobile').classList.contains('open') ? 'hidden' : '';
}
function closeMobileNav() {
  document.getElementById('nav-backdrop').classList.remove('open');
  document.getElementById('nav-mobile').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Demo script ─────────────────────────────────────────
let paused = false;
let timeoutId = null;

function sleep(ms) {
  return new Promise(r => { timeoutId = setTimeout(r, ms); });
}

function log(agent, msg, style = 'system') {
  const panel = document.getElementById('log-panel');
  const el = document.createElement('div');
  el.className = `log ${style}`;
  el.innerHTML = `<span class="agent">${agent}</span> ${msg}`;
  panel.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function updateStep(text) {
  document.getElementById('step-indicator').textContent = '⏳ ' + text;
}

function showAgent(id) {
  document.getElementById(id).classList.add('show');
}

async function animateLine(fromId, toId, duration = 600) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);
  const fromRect = from.getBoundingClientRect();
  const toRect = to.getBoundingClientRect();
  const diagram = document.getElementById('diagram');
  const dRect = diagram.getBoundingClientRect();

  const x1 = fromRect.left - dRect.left + fromRect.width/2;
  const y1 = fromRect.top - dRect.top + fromRect.height/2;
  const x2 = toRect.left - dRect.left + toRect.width/2;
  const y2 = toRect.top - dRect.top + toRect.height/2;

  const lineId = { 'agent-henry': 'line-hd', 'agent-nova': 'line-nd', 'agent-rex': 'line-rd', 'agent-fred': 'line-fd' }[fromId];
  const line = document.getElementById(lineId);
  if (line) {
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.style.opacity = 1;
  }
}

async function runDemo() {
  // Phase 1: System startup
  updateStep('Initializing agent network...');
  log('SYSTEM', 'Memory Bridge <span class="status-good">v0.2.0</span> — API for cross-agent memory', 'system');
  await sleep(600);
  showAgent('agent-henry');
  log('HENRY', '<span class="status-good">online</span> · Researcher agent', 'henry');
  await sleep(400);
  showAgent('agent-nova');
  log('NOVA', '<span class="status-good">online</span> · Architect / Designer agent', 'nova');
  await sleep(400);
  showAgent('agent-rex');
  log('REX', '<span class="status-good">online</span> · Reviewer / Security agent', 'rex');
  await sleep(400);
  showAgent('agent-fred');
  log('FRED', '<span class="status-good">online</span> · Builder / Execution agent', 'fred');
  await sleep(600);

  // Phase 2: Henry stores knowledge
  updateStep('Henry stores user preferences...');
  await animateLine('agent-henry', 'db-node');
  log('HENRY', '→ <span class="key">POST /memories</span> { session_id, agent_id: "henry", key: "user_pref_language" }', 'henry');
  await sleep(500);
  log('HENRY', '  <span class="arrow">└─</span> <span class="val">"User prefers English, concise replies, bullet points."</span>', 'henry');
  await sleep(300);
  log('HENRY', '→ <span class="key">POST /memories</span> { key: "user_pref_tech_stack", value: "..." }', 'henry');
  await sleep(300);
  log('HENRY', '  <span class="arrow">└─</span> <span class="val">"FastAPI + PostgreSQL + Redis. Python 3.12, dark mode."</span>', 'henry');
  await sleep(300);
  log('MEMORY', '<span class="status-good">✓ 2 memories stored</span> · Agent: henry · Session: demo-session', 'system');
  await sleep(800);

  // Phase 3: Nova designs architecture
  updateStep('Nova designs architecture...');
  await animateLine('agent-nova', 'db-node');

function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶ Resume' : '⏸ Pause';
}

function resetDemo() {
  if (timeoutId) clearTimeout(timeoutId);
  document.getElementById('log-panel').innerHTML = '';
  document.querySelectorAll('.agent-node').forEach(n => n.classList.remove('show'));
  document.querySelectorAll('.conn').forEach(c => c.style.opacity = 0);
  document.getElementById('step-indicator').textContent = 'Ready';
  paused = false;
  document.getElementById('pause-btn').textContent = '⏸ Pause';
  setTimeout(runDemo, 300);
}

// Override sleep to handle pause
const origSleep = sleep;
async function sleep(ms) {
  return new Promise(r => {
    const check = () => {
      if (!paused) {
        timeoutId = setTimeout(r, ms);
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}

document.addEventListener('DOMContentLoaded', runDemo);
