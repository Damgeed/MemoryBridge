<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/playground/style.css">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; width: 100%; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="/playground/logo.svg" alt="Memory Bridge">
            Memory <span class="logo-accent">Bridge</span>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/playground/">Playground</a>
            <a href="/playground/graph.html">Graph</a>
            <a href="/dashboard/">Dashboard</a>
            <a href="/pricing">Pricing</a>
            <a href="/api-docs" class="active">API Docs</a>
        </div>
        <div class="nav-right">
            <div style="position:relative;display:inline-flex;">
                <button class="nav-icon-btn lang-toggle" onclick="toggleLang()" title="Switch language" aria-label="Switch language">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </button>
                <div class="lang-dropdown" id="lang-dropdown">
                    <a href="javascript:void(0)" data-lang="en" class="lang-opt active" onclick="setLang('en')">🇬🇧 English</a>
                    <a href="javascript:void(0)" data-lang="zh" class="lang-opt" onclick="setLang('zh')">🇨🇳 中文</a>
                    <a href="javascript:void(0)" data-lang="ja" class="lang-opt" onclick="setLang('ja')">🇯🇵 日本語</a>
                    <a href="javascript:void(0)" data-lang="ko" class="lang-opt" onclick="setLang('ko')">🇰🇷 한국어</a>
                    <a href="javascript:void(0)" data-lang="es" class="lang-opt" onclick="setLang('es')">🇪🇸 Español</a>
                    <a href="javascript:void(0)" data-lang="fr" class="lang-opt" onclick="setLang('fr')">🇫🇷 Français</a>
                    <a href="javascript:void(0)" data-lang="de" class="lang-opt" onclick="setLang('de')">🇩🇪 Deutsch</a>
                </div>
            </div>
            <button class="nav-icon-btn theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-sun">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-moon" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <a href="/dashboard/" class="auth-nav-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Sign In</span>
            </a>
            <a href="/playground/" class="nav-cta">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <span>Launch</span>
            </a>
            <button class="nav-hamburger" onclick="toggleMobileNav()" aria-label="Open menu">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Nav Panel -->
    <div class="nav-mobile-backdrop" id="nav-backdrop" onclick="closeMobileNav()"></div>
    <div class="nav-mobile-panel" id="nav-mobile">
        <div class="nav-mobile-header">
            <div class="logo"><img src="/playground/logo.svg" alt=""> Memory <span class="logo-accent">Bridge</span></div>
            <button class="nav-mobile-close" onclick="closeMobileNav()" aria-label="Close menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <a href="/" onclick="closeMobileNav()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
        <a href="/playground/" onclick="closeMobileNav()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Playground</a>
        <a href="/playground/graph.html" onclick="closeMobileNav()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="5" r="3"/><circle cx="19" cy="5" r="3"/><circle cx="12" cy="19" r="3"/><line x1="5" y1="5" x2="19" y2="5"/><line x1="5" y1="5" x2="12" y2="19"/><line x1="19" y1="5" x2="12" y2="19"/></svg> Graph</a>
        <a href="/dashboard/" onclick="closeMobileNav()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Dashboard</a>
        <a href="/dashboard/" class="auth-nav-link" onclick="closeMobileNav()" style="display:flex;align-items:center;gap:0.45rem;padding:0.7rem 1.25rem;border-radius:var(--radius-sm);font-size:0.88rem;font-weight:600;color:var(--accent);text-decoration:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Sign In
        </a>
        <a href="/pricing" onclick="closeMobileNav()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Pricing</a>
        <a href="/api-docs" class="active" onclick="closeMobileNav()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> API Docs</a>
        <div class="nav-mobile-divider"></div>
        <a href="/playground/" class="nav-mobile-cta" onclick="closeMobileNav()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Launch Playground</a>
    </div>

    <iframe src="/docs" title="API Documentation"></iframe>

    <script>
        // ── Theme ──────────────────────────────────────────────────
        (function initTheme() {
            const saved = localStorage.getItem('mb-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
            updateThemeIcons();
        })();
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('mb-theme', next);
            updateThemeIcons();
        }
        function updateThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme');
            const isDark = theme === 'dark';
            document.querySelectorAll('.theme-toggle-btn').forEach(btn => {
                const sun = btn.querySelector('.theme-sun');
                const moon = btn.querySelector('.theme-moon');
                if (sun) sun.style.display = isDark ? 'block' : 'none';
                if (moon) moon.style.display = isDark ? 'none' : 'block';
            });
        }
        // ── Mobile Nav ───────────────────────────────────────────
        function toggleMobileNav() {
            const panel = document.getElementById('nav-mobile');
            const backdrop = document.getElementById('nav-backdrop');
            const isOpen = panel.classList.toggle('open');
            backdrop.classList.toggle('open');
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }
        function closeMobileNav() {
            const panel = document.getElementById('nav-mobile');
            const backdrop = document.getElementById('nav-backdrop');
            if (panel) panel.classList.remove('open');
            if (backdrop) backdrop.classList.remove('open');
            document.body.style.overflow = '';
        }
        // ── Language ────────────────────────────────────────────────
        function toggleLang() {
            document.getElementById('lang-dropdown').classList.toggle('open');
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.lang-toggle') && !e.target.closest('#lang-dropdown')) {
                document.getElementById('lang-dropdown')?.classList.remove('open');
            }
        });
        function setLang(code) {
            localStorage.setItem('mb-lang', code);
            document.querySelectorAll('.lang-opt').forEach(el => el.classList.remove('active'));
            const opt = document.querySelector(`.lang-opt[data-lang="${code}"]`);
            if (opt) opt.classList.add('active');
            document.getElementById('lang-dropdown').classList.remove('open');
        }
        (function initLang() {
            const saved = localStorage.getItem('mb-lang') || 'en';
            document.querySelectorAll('.lang-opt').forEach(el => el.classList.remove('active'));
            const opt = document.querySelector(`.lang-opt[data-lang="${saved}"]`);
            if (opt) opt.classList.add('active');
        })();
    </script>
</body>
</html>
