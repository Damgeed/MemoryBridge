<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
    <title>Memory Bridge — Dashboard</title>
    <link rel="icon" href="/playground/logo.png" type="image/png">
    <link rel="stylesheet" href="/playground/style.css">
    <style>
        .dash-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .dash-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.25rem;
        }
        .dash-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .dash-header h1 span.gradient-text {
            background: linear-gradient(135deg, var(--accent), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .dash-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.92rem;
        }

        /* (tier-badge and refresh-sub-btn replaced by sub-hero premium design above) */

        .dash-grid {
            display: grid;
            gap: 1.5rem;
        }
        .dash-card {
            background: var(--card-bg);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            overflow: hidden;
            min-width: 0;
        }
        .dash-card:hover {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-md);
        }
        .dash-card .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ── API Key List ──────────────────────────── */
        .key-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-subtle);
        }
        .key-item:last-child { border-bottom: none; }
        .key-item .key-label {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-primary);
            min-width: 100px;
            flex-shrink: 0;
        }
        .key-item .key-value {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .key-item .key-date {
            font-size: 0.72rem;
            color: var(--text-faint);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .key-item .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-primary);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .key-item .btn-icon:hover {
            background: var(--btn-secondary-hover);
            color: var(--accent);
        }

        .key-reveal {
            margin-top: 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent);
            border-radius: var(--radius-md);
            padding: 1rem;
        }
        .key-reveal .key-plaintext {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent);
            word-break: break-all;
            user-select: all;
            margin-bottom: 0.5rem;
        }
        .key-reveal .key-warning {
            font-size: 0.78rem;
            color: var(--orange);
        }

        /* ── Terminal / Code Blocks ────────────────── */
        .term-block {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.65;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            margin-bottom: 1rem;
        }
        .term-block .term-line { color: var(--code-text); white-space: nowrap; }
        .term-block .term-prompt { color: var(--green); white-space: nowrap; }
        .term-block .term-comment { color: #6c7086; font-style: italic; }
        .term-copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            font-size: 0.72rem;
            font-family: var(--font-sans);
            background: var(--bg-glass);
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .term-copy-btn:hover {
            background: var(--accent-glow);
            color: var(--accent);
            border-color: var(--accent);
        }
        .term-copy-btn.copied {
            background: var(--green-bg);
            color: var(--green);
            border-color: var(--green);
        }

        .step-flow {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }
        .step-content { flex: 1; }
        .step-content h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; }
        .step-content p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.55; }

        .empty-keys {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-faint);
        }
        .empty-keys .icon { font-size: 2rem; margin-bottom: 0.5rem; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-glass-strong);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 0.7rem 1.2rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
            pointer-events: none;
            max-width: calc(100vw - 2rem);
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .spinner-sm {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-primary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        /* ── Confirm Modal ─────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 999;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: block; }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: var(--card-bg);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            min-width: 320px;
            max-width: 90vw;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }
        .modal.open { display: block; }
        .modal .modal-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .modal .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .modal .modal-text { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.25rem; }
        .modal .modal-btns { display: flex; gap: 0.5rem; justify-content: center; }
        .btn-danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.35rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all var(--transition-fast);
            background: var(--red);
            color: #fff;
        }
        .btn-danger:hover { opacity: 0.85; transform: translateY(-1px); }
        @media (max-width: 480px) {
            .modal { min-width: unset; width: 90vw; padding: 1.25rem; }
            .modal .modal-title { font-size: 1rem; }
            .modal .modal-text { font-size: 0.82rem; }
        }

        /* ── User Avatar + Dropdown ─────────────────────── */
        .user-avatar-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem 0.25rem 0.25rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-primary);
            background: transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            color: var(--text-primary);
        }
        .user-avatar-btn:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .user-avatar-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .user-avatar-name {
            font-size: 0.82rem;
            font-weight: 600;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-chevron {
            color: var(--text-faint);
            transition: transform 0.2s;
        }
        .user-menu.open .user-chevron {
            transform: rotate(180deg);
        }
        .user-menu {
            position: relative;
            display: inline-flex;
        }
        .user-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 220px;
            background: var(--card-bg);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            z-index: 100;
            overflow: hidden;
            backdrop-filter: blur(16px);
            animation: drop-in 0.15s ease;
        }
        @keyframes drop-in {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-menu.open .user-dropdown { display: block; }
        .user-dropdown-header {
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .user-dropdown-email {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }
        .user-dropdown-plan {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .user-dropdown-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 0;
        }
        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: background var(--transition-fast);
        }
        .user-dropdown-item svg {
            flex-shrink: 0;
            color: var(--text-muted);
        }
        .user-dropdown-item:hover {
            background: var(--btn-secondary-hover);
            color: var(--text-primary);
        }
        .user-dropdown-item:last-child:hover {
            color: var(--red);
        }
        .user-dropdown-item:last-child:hover svg {
            color: var(--red);
        }

        /* ── Logout Confirm Modal ────────────────────────── */
        .logout-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1001;
            backdrop-filter: blur(6px);
        }
        .logout-modal-overlay.open { display: block; }
        .logout-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.96);
            z-index: 1002;
            background: var(--card-bg);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            padding: 2rem;
            min-width: 360px;
            max-width: 90vw;
            box-shadow: var(--shadow-xl);
            text-align: center;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .logout-modal.open {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .logout-modal .logout-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--red-bg, rgba(239,68,68,0.12));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.6rem;
        }
        .logout-modal .logout-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .logout-modal .logout-text {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 1.5rem;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }
        .logout-modal .logout-btns {
            display: flex;
            gap: 0.65rem;
            justify-content: center;
        }
        .logout-modal .logout-btns .btn {
            min-width: 120px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
        }
        @media (max-width: 520px) {
            .logout-modal {
                min-width: unset;
                width: 88vw;
                padding: 1.5rem;
            }
            .logout-modal .logout-title { font-size: 1rem; }
            .logout-modal .logout-text { font-size: 0.82rem; }
            .logout-modal .logout-btns { flex-direction: column; align-items: stretch; }
            .logout-modal .logout-btns .btn { width: 100%; text-align: center; justify-content: center; }
            .user-dropdown { right: -40px; }
        }

        /* ── Profile Card ────────────────────────────────── */
        .profile-card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .profile-avatar-large {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .profile-info {
            flex: 1;
            min-width: 0;
        }
        .profile-info .profile-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .profile-info .profile-email {
            font-size: 0.82rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
        }
        .profile-meta-item {
            font-size: 0.82rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .profile-meta-item strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ── Subscription Card — Premium ──────────────────── */

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;

        async function revokeKey(keyId) {
            showConfirm('🗑️', 'Revoke API key?', 'This API key will stop working <strong>immediately</strong>. Any services using it will lose access.', 'Revoke Key', async () => {
                try {
                    const result = await api('DELETE', '/dashboard/keys/' + keyId);
                    showToast('🗑️ Key revoked');
                    // Auto-dismiss key-limit popup since we're now below the limit
                    const revealArea = document.getElementById('key-reveal-area');
                    if (revealArea) revealArea.innerHTML = '';
                    loadKeys();
                    loadDashboard();  // Refresh subscription card key count
                } catch (e) {
                    const msg = e.message || '';
                    if (msg.includes('Too many requests') || msg.includes('Rate limit exceeded')) {
                        showToast(' Upgrade your plan for higher rate limits.');
                    } else {
                        showToast(' ' + msg);
                    }
                }
            });
        }

        // ── Auth Modal ──────────────────────────────────────────────
        function openAuth(tab) {
            document.getElementById('auth-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
            showAuthOptions();
            selectAuthTab(tab === 'signup' ? 'signup' : 'signin');
        }

        function socialLogin(connection) {
            window.location.href = '/auth/auth0/login?connection=' + connection + (authMode === 'signup' ? '&screen_hint=signup' : '');
        }

        let authMode = 'signin'; // 'signin' or 'signup'

        function selectAuthTab(mode) {
            authMode = mode;
            const signinTab = document.getElementById('auth-tab-signin');
            const signupTab = document.getElementById('auth-tab-signup');
            if (!signinTab || !signupTab) return;
            const subtitle = document.getElementById('auth-subtitle');

            if (mode === 'signin') {
                signinTab.style.background = 'var(--accent)';
                signinTab.style.color = '#fff';
                signupTab.style.background = 'transparent';
                signupTab.style.color = 'var(--text-muted)';
                subtitle.textContent = 'Sign in to access your account.';
            } else {
                signupTab.style.background = 'var(--accent)';
                signupTab.style.color = '#fff';
                signinTab.style.background = 'transparent';
                signinTab.style.color = 'var(--text-muted)';
                subtitle.textContent = 'Create an account to get started.';
            }
        }

        function closeAuth() {
            document.getElementById('auth-overlay').classList.remove('open');
            document.body.style.overflow = '';
            pendingEmail = '';
            pendingPhone = '';
            pendingMethod = 'email';
        }

        function showAuthOptions() {
            document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
            const opts = document.getElementById('auth-options');
            opts.style.display = '';
            // Reset code step
            document.getElementById('pl-code').value = '';
            document.getElementById('pl-email').value = '';
            document.getElementById('pl-phone').value = '';
            document.getElementById('auth-code-step').classList.remove('active');
            document.getElementById('auth-phone-step').classList.remove('active');
            document.getElementById('auth-recovery-step').style.display = 'none';
            // Clear all errors
            document.querySelectorAll('.auth-error').forEach(el => el.textContent = '');
            // Re-enable buttons
            document.getElementById('pl-email-btn').disabled = false;
            document.getElementById('pl-code-btn').disabled = false;
            document.getElementById('pl-phone-btn').disabled = false;
            pendingMethod = 'email';
            pendingPhone = '';
            // Reset recovery code section
            const recoveryCodeSection = document.getElementById('recovery-code-section');
            if (recoveryCodeSection) recoveryCodeSection.style.display = 'none';
            const recoveryEmailRow = document.getElementById('recovery-email-row');
            if (recoveryEmailRow) recoveryEmailRow.style.display = '';
            const recoveryBtn = document.getElementById('recovery-btn');
            if (recoveryBtn) recoveryBtn.style.display = '';
            // Reset buttons
            const continueBtn = document.getElementById('pl-email-btn');
            if (continueBtn) { continueBtn.innerHTML = 'Continue →'; continueBtn.disabled = false; }
            const recoveryResetBtn = document.getElementById('recovery-btn');
            if (recoveryResetBtn) { recoveryResetBtn.innerHTML = 'Recover Account →'; recoveryResetBtn.disabled = false; }
            const recoveryVerifyBtn = document.getElementById('recovery-verify-btn');
            if (recoveryVerifyBtn) { recoveryVerifyBtn.innerHTML = 'Verify Code →'; recoveryVerifyBtn.disabled = false; }
        }

        function phoneLogin() {
            pendingMethod = 'phone';
            document.getElementById('auth-options').style.display = 'none';
            document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
            document.getElementById('auth-phone-step').classList.add('active');
            document.getElementById('pl-phone').value = '';
            document.getElementById('auth-error-phone').textContent = '';
            document.getElementById('pl-phone-btn').disabled = false;
            setTimeout(() => document.getElementById('pl-phone').focus(), 150);
        }

        function updatePhoneFlag() {
            // Placeholder — the select handles display natively with emoji flags
        }

        async function sendPhoneCode() {
            const countryCode = document.getElementById('pl-country-code').value;
            const localNum = document.getElementById('pl-phone').value.trim().replace(/[^0-9]/g, '');
            const errorEl = document.getElementById('auth-error-phone');
            const btn = document.getElementById('pl-phone-btn');
            if (!localNum) {
                errorEl.innerHTML = 'Enter your phone number';
                return;
            }
            const fullPhone = '+' + countryCode + localNum;
            const originalBtnHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-sm"></span> Sending...';
            btn.disabled = true;
            try {
                const res = await fetch('/auth/auth0/passwordless/start-sms', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone: fullPhone}),
                });
                if (!res.ok) {
                    let errMsg = 'Failed to send code';
                    try {
                        const err = await res.json();
                        errMsg = err.detail || err.message || errMsg;
                    } catch {
                        try {
                            const text = await res.text();
                            if (text) errMsg = text.slice(0, 200);
                        } catch {}
                    }
                    errorEl.innerHTML = errMsg;
                    btn.innerHTML = originalBtnHTML;
                    btn.disabled = false;
                    return;
                }
                const data = await res.json();
                pendingPhone = fullPhone;
                // Show code verification step with phone icon
                document.getElementById('code-back-label').textContent = 'Change phone';
                document.getElementById('code-step-icon').innerHTML = '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>';
                document.getElementById('code-email-display').textContent = data.phone || '*******' + fullPhone.slice(-4);
                document.getElementById('auth-phone-step').classList.remove('active');
                document.getElementById('auth-code-step').classList.add('active');
                document.getElementById('pl-code').value = '';
                document.getElementById('auth-error-code').textContent = '';
                setTimeout(() => document.getElementById('pl-code').focus(), 150);
                btn.disabled = false;
            } catch (e) {
                const isNetwork = e.message === 'Failed to fetch' || e.name === 'TypeError' || e.message === 'NetworkError';
                errorEl.innerHTML = isNetwork
                    ? 'Could not reach server. Check your connection.'
                    : e.message;
                btn.disabled = false;
            }
        }

        async function continueWithEmail() {
            const email = document.getElementById('pl-email').value.trim();
            const errorEl = document.getElementById('auth-error-main');
            const btn = document.getElementById('pl-email-btn');
            if (!email || !email.includes('@')) {
                errorEl.innerHTML = 'Enter a valid email address';
                return;
            }
            const originalBtnHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-sm"></span> Sending...';
            btn.disabled = true;
            try {
                // Check if email exists — enforce sign-in vs sign-up distinction
                const checkRes = await fetch('/auth/check-email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email}),
                });
                let checkData = {exists: false};
                if (checkRes.ok) checkData = await checkRes.json();

                if (authMode === 'signin' && !checkData.exists) {
                    errorEl.innerHTML = '<span class="auth-notice">No account found. Try the Create Account tab.</span>';
                    btn.innerHTML = originalBtnHTML;
                    btn.disabled = false;
                    return;
                }
                if (authMode === 'signup' && checkData.exists) {
                    errorEl.innerHTML = '<span class="auth-notice">An account already exists with this email. Sign in to your account.</span>';
                    btn.innerHTML = originalBtnHTML;
                    btn.disabled = false;
                    return;
                }

                const res = await fetch('/auth/auth0/passwordless/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email}),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    errorEl.innerHTML = (err.detail || 'Failed to send code');
                    btn.innerHTML = originalBtnHTML;
                    btn.disabled = false;
                    return;
                }
                const data = await res.json();
                pendingEmail = email;
                pendingMethod = 'email';
                document.getElementById('code-back-label').textContent = 'Change email';
                document.getElementById('code-step-icon').innerHTML = '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/>';
                document.getElementById('code-email-display').textContent = data.email || email[0] + '***' + email.substring(email.indexOf('@'));
                // Show code verification step
                document.getElementById('auth-options').style.display = 'none';
                document.getElementById('auth-code-step').classList.add('active');
                document.getElementById('pl-code').value = '';
                document.getElementById('auth-error-code').textContent = '';
                setTimeout(() => document.getElementById('pl-code').focus(), 150);
                btn.disabled = false;
            } catch (e) {
                const isNetwork = e.message === 'Failed to fetch' || e.name === 'TypeError' || e.message === 'NetworkError';
                errorEl.innerHTML = isNetwork
                    ? 'Could not reach server. Check your connection.'
                    : e.message;
                btn.innerHTML = originalBtnHTML;
                btn.disabled = false;
            }
        }

        async function verifyCode() {
            const code = document.getElementById('pl-code').value.trim();
            const errorEl = document.getElementById('auth-error-code');
            const btn = document.getElementById('pl-code-btn');
            if (!code || code.length < 4) {
                errorEl.innerHTML = 'Enter your 6-digit verification code';
                return;
            }
            const originalBtnHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-sm"></span> Verifying...';
            btn.disabled = true;
            try {
                const body = pendingMethod === 'phone'
                    ? {phone: pendingPhone, code}
                    : {email: pendingEmail, code};
                const res = await fetch('/auth/auth0/passwordless/verify', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    errorEl.innerHTML = (err.detail || 'Verification failed');
                    btn.innerHTML = originalBtnHTML;
                    btn.disabled = false;
                    return;
                }
                const data = await res.json();
                localStorage.setItem('mb_jwt', data.token);
                if (data.api_key) {
                    localStorage.setItem('mb_api_key', data.api_key);
                    currentApiKey = data.api_key;
                }
                updateAuthUI();
                window.postAuthCallback?.();
                window.postAuthCallback = null;
                const _params = new URLSearchParams(window.location.search);
                if (_params.has('pending_org_id')) {
                    fetch('/auth/link-subscription', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + data.token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pending_org_id: _params.get('pending_org_id') })
                    }).catch(() => {});
                }
                closeAuth();
                window.location.reload();
            } catch (e) {
                const isNetwork = e.message === 'Failed to fetch' || e.name === 'TypeError' || e.message === 'NetworkError';
                errorEl.innerHTML = isNetwork
                    ? 'Could not reach server. Check your connection.'
                    : e.message;
                btn.innerHTML = originalBtnHTML;
                btn.disabled = false;
            }
        }

        async function resendCode() {
            const errorEl = document.getElementById('auth-error-code');
            const btn = document.getElementById('pl-code-btn');
            if (!pendingEmail && !pendingPhone) return;
            errorEl.innerHTML = '<span class="auth-spinner"></span>';
            btn.disabled = true;
            try {
                const url = pendingMethod === 'phone'
                    ? '/auth/auth0/passwordless/start-sms'
                    : '/auth/auth0/passwordless/start';
                const body = pendingMethod === 'phone'
                    ? JSON.stringify({phone: pendingPhone})
                    : JSON.stringify({email: pendingEmail});
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body,
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    errorEl.innerHTML = (err.detail || 'Failed to resend code');
                    btn.disabled = false;
                    return;
                }
                errorEl.innerHTML = '✅ New code sent!';
                document.getElementById('pl-code').value = '';
                setTimeout(() => document.getElementById('pl-code').focus(), 150);
                btn.disabled = false;
            } catch (e) {
                const isNetwork = e.message === 'Failed to fetch' || e.name === 'TypeError' || e.message === 'NetworkError';
                errorEl.innerHTML = isNetwork
                    ? 'Could not reach server. Check your connection.'
                    : e.message;
                btn.disabled = false;
            }
        }

        // ── Confirm Modal ─────────────────────────────────────────
        let _confirmCallback = null;

        function showConfirm(icon, title, text, okLabel, callback) {
            document.getElementById('confirm-icon').textContent = icon || '';
            document.getElementById('confirm-title').textContent = title || 'Are you sure?';
            document.getElementById('confirm-text').innerHTML = text || 'This action cannot be undone.';
            document.getElementById('confirm-ok-btn').textContent = okLabel || 'Delete';
            _confirmCallback = callback;
            document.getElementById('confirm-overlay').classList.add('open');
            document.getElementById('confirm-modal').classList.add('open');
        }

        function closeConfirm() {
            document.getElementById('confirm-overlay').classList.remove('open');
            document.getElementById('confirm-modal').classList.remove('open');
            _confirmCallback = null;
        }

        function confirmAction() {
            const cb = _confirmCallback;
            closeConfirm();
            if (cb) cb();
        }

        // ── Copy Utilities ─────────────────────────────────────────
        function copyCmd(btn, text) {
            copyText(btn, text);
        }

        function copyPyCode(btn) {
            // Build the full curl command with the current API key
            const key = currentApiKey || localStorage.getItem('mb_api_key') || 'YOUR_API_KEY';
            const cmd = `curl -X POST http://localhost:8000/memories \\
  -H "Authorization: Bearer ${key}" \\
  -H "Content-Type: application/json" \\
  -d '{"session_id":"my-session","agent_id":"henry","key":"hello","value":"Hello Memory Bridge!"}'`;
            copyText(btn, cmd);
        }

        function copyKey(keyId) {
            copyText(event.target.closest('.btn-icon'), keyId);
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = '✅ Copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('📋 Copied!');
            });
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showAuthenticatedContent(show) {
            const gate = document.getElementById('dash-auth-gate');
            const inner = document.getElementById('dash-authenticated-inner');
            if (gate) gate.style.display = show ? 'none' : 'block';
            if (inner) inner.style.display = show ? 'block' : 'none';
            const status = document.getElementById('dash-status');
            if (status) status.style.display = show ? 'block' : 'none';
        }

        // ── Init ──────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            await initAuth();
            currentApiKey = localStorage.getItem('mb_api_key') || '';
            let jwt = localStorage.getItem('mb_jwt');

            // Check URL params for JWT from OAuth callback redirect
            const params = new URLSearchParams(window.location.search);
            const paramJwt = params.get('jwt');
            const paramOrg = params.get('org_id');
            if (paramJwt) {
                jwt = paramJwt;
                localStorage.setItem('mb_jwt', paramJwt);
                if (paramOrg) {
                    localStorage.setItem('mb_org_id', paramOrg);
                }
                // Clean URL without params
                window.history.replaceState({}, '', '/dashboard/');
            }

            // Detect Stripe checkout redirect — call welcome endpoint
            const sessionId = params.get('session_id');
            if (sessionId) {
                handleStripeWelcome(sessionId);
                return;
            }

            // Priority: API key > JWT — API key never expires
            if (currentApiKey && currentApiKey !== 'mb_demo_public_test') {
                // Already have a durable key — skip JWT validation entirely
                showAuthenticatedContent(true);
                updateAuthUI();
                reloadDashboard();
            } else if (jwt) {
                // Has JWT — no stored API key, but can still access dashboard via JWT
                showAuthenticatedContent(true);
                updateAuthUI();
                reloadDashboard();
            } else {
                // Not authenticated — show the sign-in gate on dashboard
                showAuthenticatedContent(false);
            }
        });

        async function handleStripeWelcome(sessionId) {
            const statusEl = document.getElementById('dash-status');
            statusEl.textContent = '✅ Payment confirmed! Setting up your account...';

            // Clear pending state saved by pricing page
            localStorage.removeItem('mb_pending_org_id');
            localStorage.removeItem('mb_pending_tier');
            window.history.replaceState({}, '', '/dashboard/');

            // Always call stripe-welcome to store the subscription locally
            // (previously this was gated on !jwt&&!apiKey, which meant logged-in
            // users with a valid JWT skipped it — causing the poll below to loop
            // forever because the subscription was never persisted)
            let jwt = localStorage.getItem('mb_jwt');
            let apiKey = localStorage.getItem('mb_api_key');
            try {
                statusEl.textContent = '🔄 Verifying payment...';
                const welcomeRes = await fetch('/dashboard/stripe-welcome?session_id=' + encodeURIComponent(sessionId), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                if (welcomeRes.ok) {
                    const welcomeData = await welcomeRes.json();
                    // Always update JWT — stripe-welcome generates a fresh token
                    // with the correct org_id and subscription info from Stripe
                    if (welcomeData.token) {
                        localStorage.setItem('mb_jwt', welcomeData.token);
                        jwt = welcomeData.token;
                        currentApiKey = '';
                    }
                    showAuthenticatedContent(true);
                    updateAuthUI();
                    statusEl.textContent = '✅ Payment confirmed! Setting up your account...';
                }
            } catch (e) {
                console.warn('Stripe welcome failed:', e);
            }

            // Show the authenticated content
            showAuthenticatedContent(true);
            updateAuthUI();

            // Poll for subscription — Stripe webhook updates it asynchronously
            // stripe-welcome already stores the subscription locally, so this
            // should resolve within 1-2 attempts
            let attempts = 0;
            const maxAttempts = 15; // 30 seconds max
            const poll = setInterval(async () => {
                attempts++;
                try {
                    const data = await api('GET', '/dashboard/data');
                    if (data.tier !== 'free') {
                        clearInterval(poll);
                        loadDashboard();
                        statusEl.textContent = `🎉 Welcome to the ${data.tier.charAt(0).toUpperCase() + data.tier.slice(1)} plan!`;
                        showToast(`🎉 Welcome to the ${data.tier.charAt(0).toUpperCase() + data.tier.slice(1)} plan!`);
                    } else if (attempts === 8) {
                        // After 16s, try to restore subscription as fallback
                        statusEl.textContent = '⏳ Finalizing your subscription...';
                        try {
                            const restoreData = await api('POST', '/dashboard/restore-subscription');
                            if (restoreData.restored && restoreData.tier !== 'free') {
                                clearInterval(poll);
                                loadDashboard();
                                statusEl.textContent = `🎉 Welcome to the ${restoreData.tier.charAt(0).toUpperCase() + restoreData.tier.slice(1)} plan!`;
                                showToast(`🎉 Subscription restored!`);
                                return;
                            }
                        } catch { /* fall through */ }
                        statusEl.textContent = '✅ Payment confirmed! Finalizing your account...';
                    } else if (attempts >= maxAttempts) {
                        clearInterval(poll);
                        statusEl.textContent = '⏳ Loading your dashboard...';
                        loadDashboard();
                        // Async restore attempt — don't block the UI
                        api('POST', '/dashboard/restore-subscription').then(restoreData => {
                            if (restoreData.restored && restoreData.tier !== 'free') {
                                showToast(`🎉 Subscription restored!`);
                                reloadDashboard();
                            }
                        }).catch(() => {});
                    }
                } catch (e) {
                    statusEl.textContent = e.message || 'Checking subscription...';
                    if (attempts >= maxAttempts) {
                        clearInterval(poll);
                        statusEl.textContent = '⏳ Loading your dashboard...';
                        loadDashboard();
                        api('POST', '/dashboard/restore-subscription').then(restoreData => {
                            if (restoreData.restored && restoreData.tier !== 'free') {
                                showToast(`🎉 Subscription restored!`);
                                reloadDashboard();
                            }
                        }).catch(() => {});
                    }
                }
            }, 2000);
        }
    </script>
