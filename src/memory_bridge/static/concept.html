<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8f9fc" media="(prefers-color-scheme: light)">
    <title>Memory Bridge — Agent Memory Concept</title>
    <link rel="icon" href="/playground/logo.png" type="image/png">
    <link rel="stylesheet" href="/playground/style.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
body { background: #020617; overflow: hidden; height: 100vh; }
.concept-visual {
    position: relative; width: 100vw; height: calc(100vh - 56px);
    background: radial-gradient(ellipse at 50% 50%, #0f172a 0%, #020617 70%);
    overflow: hidden;
}
.concept-visual::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 25% 35%, rgba(34,211,238,0.04) 0%, transparent 50%),
                radial-gradient(circle at 75% 35%, rgba(52,211,153,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}
.grid { position: absolute; inset: 0;
    background-image: linear-gradient(rgba(30,41,59,0.25) 1px, transparent 1px), linear-gradient(90deg, rgba(30,41,59,0.25) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; animation: gridPulse 8s ease-in-out infinite; }
@keyframes gridPulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
.particle-field { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.particle-field span { position:absolute; border-radius:50%; opacity:0; animation:floatParticle linear infinite; }
.concept-title { position:absolute; top:3%; left:0; right:0; text-align:center; color:#e2e8f0; font-size:clamp(9px,1.2vw,13px); font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.5; z-index:10; pointer-events:none; }
.concept-title span { color:#22d3ee; }
svg.concept-svg { position:absolute; inset:0; width:100%; height:100%; display:block; }
.concept-legend { position:absolute; bottom:clamp(8px,2vh,24px); left:50%; transform:translateX(-50%); display:flex; gap:clamp(10px,2vw,28px); background:rgba(15,23,42,0.85); padding:clamp(6px,1vh,10px) clamp(12px,2vw,22px); border-radius:10px; border:1px solid #1e293b; backdrop-filter:blur(8px); z-index:10; flex-wrap:wrap; justify-content:center; }
.concept-legend-item { display:flex; align-items:center; gap:clamp(4px,0.8vw,8px); color:#94a3b8; font-size:clamp(7px,0.9vw,10px); font-weight:500; letter-spacing:0.3px; white-space:nowrap; }
.concept-legend-item .dot { width:clamp(6px,0.9vw,10px); height:clamp(6px,0.9vw,10px); border-radius:50%; flex-shrink:0; }
.concept-legend-item .dot.cyan { background:#22d3ee; box-shadow:0 0 8px rgba(34,211,238,0.5); }
.concept-legend-item .dot.emerald { background:#34d399; box-shadow:0 0 8px rgba(52,211,153,0.5); }
.concept-legend-item .dot.violet { background:#a78bfa; box-shadow:0 0 8px rgba(167,139,250,0.5); }
.concept-legend-item .dot.orange { background:#fb923c; box-shadow:0 0 8px rgba(251,146,60,0.5); }
@keyframes floatParticle {
    0%{transform:translateY(0) scale(0);opacity:0}
    10%{opacity:0.8}
    20%{transform:translateY(-30px) scale(1);opacity:0.6}
    80%{opacity:0.4}
    100%{transform:translateY(-120px) scale(0);opacity:0}
}

        /* ── Hero ───────────────────────────────────────────── */
        @media (max-width: 768px) {
            .hero-section { flex-direction: column; padding: 1.5rem 1rem 1.5rem; min-height: auto; gap: 1.5rem; }
            .hero-content { text-align: center; }
            .hero-section h1 { font-size: 1.8rem; }
            .hero-cta { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .hero-visual { width: 100%; }
            .hero-stats { gap: 1rem; justify-content: center; }
            .hero-stat .num { font-size: 1.3rem; }
            .steps-grid { grid-template-columns: 1fr; }
            .qa-grid { grid-template-columns: 1fr; }
            .section { padding: 1.5rem 1rem; }
            .section-title { font-size: 1.3rem; }
            .bubble { padding: 0.8rem 1rem; }
            .bubble .bubble-text { font-size: 0.82rem; }
            .auth-btn-container { display: inline-flex !important; }
            .nav-cta { display: none !important; }
        }

        @media (max-width: 480px) {
            .hero-section { padding: 1rem 0.75rem; gap: 1.25rem; }
            .hero-content { text-align: center; }
            .hero-section h1 { font-size: 1.5rem; }
            .hero-tagline { font-size: 0.95rem; }
            .hero-cta { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .hero-cta .btn-primary { padding: 0.5rem 1rem; font-size: 0.82rem; }
            .hero-cta .btn-ghost-accent { padding: 0.5rem 1rem; font-size: 0.82rem; }
            .hero-stats { flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
            .hero-stat .num { font-size: 1.1rem; }
            .hero-stat .label { font-size: 0.7rem; }
            .section-title { font-size: 1.15rem; }
            .section-subtitle { font-size: 0.85rem; }
            .step-card { padding: 1.25rem 1rem; }
            .qa-card { padding: 1.1rem; }
            .qa-card .q { font-size: 0.88rem; }
            .qa-card .a { font-size: 0.82rem; }
            .bubble:nth-child(2) { margin-left: 0.75rem !important; }
            .cta-row { flex-direction: column; align-items: stretch; }
            .cta-row .btn { width: 100%; justify-content: center; }
            .model-card { padding: 1rem; overflow-x: auto; }
            .model-table { font-size: 0.75rem; }
            .model-table th,
            .model-table td { padding: 0.4rem 0.5rem; }
        }

        /* ── User Avatar + Dropdown ─────────────────────── */
        .user-avatar-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem 0.25rem 0.25rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-primary);
            background: transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            color: var(--text-primary);
        }
        .user-avatar-btn:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .user-avatar-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .user-avatar-name {
            font-size: 0.82rem;
            font-weight: 600;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-chevron {
            color: var(--text-faint);
            transition: transform 0.2s;
        }
        .user-menu.open .user-chevron {
            transform: rotate(180deg);
        }
        .user-menu {
            position: relative;
            display: inline-flex;
        }
        .user-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 220px;
            background: var(--card-bg);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            z-index: 100;
            overflow: hidden;
            backdrop-filter: blur(16px);
            animation: drop-in 0.15s ease;
        }
        @keyframes drop-in {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-menu.open .user-dropdown { display: block; }
        .user-dropdown-header {
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .user-dropdown-email {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }
        .user-dropdown-plan {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .user-dropdown-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 0;
        }
        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: background var(--transition-fast);
        }
        .user-dropdown-item svg {
            flex-shrink: 0;
            color: var(--text-muted);
        }
        .user-dropdown-item:hover {
            background: var(--btn-secondary-hover);
            color: var(--text-primary);
        }
        .user-dropdown-item:last-child:hover {
            color: var(--red);
        }
        .user-dropdown-item:last-child:hover svg {
            color: var(--red);
        }

        /* ── Logout Confirm Modal ────────────────────────── */
        .logout-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1001;
            backdrop-filter: blur(6px);
        }
        .logout-modal-overlay.open { display: block; }
        .logout-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.96);
            z-index: 1002;
            background: var(--card-bg);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            padding: 2rem;
            min-width: 360px;
            max-width: 90vw;
            box-shadow: var(--shadow-xl);
            text-align: center;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .logout-modal.open {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .logout-modal .logout-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--red-bg, rgba(239,68,68,0.12));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.6rem;
        }
        .logout-modal .logout-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
