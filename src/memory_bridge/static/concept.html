<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Memory Bridge — Agent Memory Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    min-height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: radial-gradient(ellipse at 50% 50%, #0f172a 0%, #020617 70%);
    overflow: hidden;
  }

  /* Floating grid background */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(30, 41, 59, 0.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 41, 59, 0.25) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Ambient floating particles (CSS) */
  .particle-field {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .particle-field span {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #22d3ee;
    opacity: 0;
    animation: floatParticle linear infinite;
  }
  .particle-field span:nth-child(1)  { left: 10%; top: 20%; width: 2px; height: 2px; animation-duration: 12s; animation-delay: 0s; background: #22d3ee; }
  .particle-field span:nth-child(2)  { left: 25%; top: 60%; width: 3px; height: 3px; animation-duration: 15s; animation-delay: 1s; background: #34d399; }
  .particle-field span:nth-child(3)  { left: 40%; top: 30%; width: 2px; height: 2px; animation-duration: 10s; animation-delay: 2s; background: #a78bfa; }
  .particle-field span:nth-child(4)  { left: 55%; top: 70%; width: 3px; height: 3px; animation-duration: 14s; animation-delay: 0.5s; background: #22d3ee; }
  .particle-field span:nth-child(5)  { left: 70%; top: 15%; width: 2px; height: 2px; animation-duration: 11s; animation-delay: 3s; background: #34d399; }
  .particle-field span:nth-child(6)  { left: 85%; top: 50%; width: 3px; height: 3px; animation-duration: 13s; animation-delay: 1.5s; background: #fb923c; }
  .particle-field span:nth-child(7)  { left: 15%; top: 80%; width: 2px; height: 2px; animation-duration: 16s; animation-delay: 0.2s; background: #a78bfa; }
  .particle-field span:nth-child(8)  { left: 50%; top: 10%; width: 4px; height: 4px; animation-duration: 18s; animation-delay: 2.5s; background: #22d3ee; }
  .particle-field span:nth-child(9)  { left: 90%; top: 75%; width: 2px; height: 2px; animation-duration: 9s; animation-delay: 1s; background: #34d399; }
  .particle-field span:nth-child(10) { left: 35%; top: 85%; width: 3px; height: 3px; animation-duration: 17s; animation-delay: 0.8s; background: #fb923c; }
  .particle-field span:nth-child(11) { left: 5%; top: 40%; width: 2px; height: 2px; animation-duration: 11s; animation-delay: 3.5s; background: #a78bfa; }
  .particle-field span:nth-child(12) { left: 75%; top: 40%; width: 4px; height: 4px; animation-duration: 14s; animation-delay: 1.2s; background: #22d3ee; }

  @keyframes floatParticle {
    0%   { transform: translateY(0) scale(0); opacity: 0; }
    10%  { opacity: 0.8; }
    20%  { transform: translateY(-30px) scale(1); opacity: 0.6; }
    80%  { opacity: 0.4; }
    100% { transform: translateY(-120px) scale(0); opacity: 0; }
  }

  /* Title */
  .title {
    position: absolute;
    top: 3%;
    left: 0; right: 0;
    text-align: center;
    color: #e2e8f0;
    font-size: clamp(9px, 1.2vw, 13px);
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.5;
    z-index: 10;
    pointer-events: none;
  }
  .title span { color: #22d3ee; }

  /* Main SVG */
  svg.main-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Legend */
  .legend {
    position: absolute;
    bottom: clamp(8px, 2vh, 24px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: clamp(10px, 2vw, 28px);
    background: rgba(15, 23, 42, 0.85);
    padding: clamp(6px, 1vh, 10px) clamp(12px, 2vw, 22px);
    border-radius: 10px;
    border: 1px solid #1e293b;
    backdrop-filter: blur(8px);
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: clamp(4px, 0.8vw, 8px);
    color: #94a3b8;
    font-size: clamp(7px, 0.9vw, 10px);
    font-weight: 500;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .legend-item .dot {
    width: clamp(6px, 0.9vw, 10px);
    height: clamp(6px, 0.9vw, 10px);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-item .dot.cyan { background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.5); }
  .legend-item .dot.emerald { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.5); }
  .legend-item .dot.violet { background: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.5); }
  .legend-item .dot.orange { background: #fb923c; box-shadow: 0 0 8px rgba(251,146,60,0.5); }
</style>
</head>
<body>
<div class="container">
  <div class="grid"></div>
  <div class="particle-field">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span>
  </div>
  <div class="title">Memory Bridge · <span>Agent Memory Architecture</span></div>

  <svg class="main-svg" viewBox="0 0 1100 750" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-violet" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="10" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-emerald" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-orange" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="brain-grad" cx="50%" cy="45%" r="50%">
        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
        <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="agent1-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
      </linearGradient>
      <linearGradient id="agent2-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#059669" stop-opacity="0.05"/>
      </linearGradient>
      <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
      </marker>
      <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
      </marker>
      <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
      </marker>
      <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/>
      </marker>
      <filter id="brain-noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="particle-glow"><feGaussianBlur stdDeviation="2"/></filter>
    </defs>

    <!-- ── AGENT 1: THE STORING AGENT ── -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0; 0,8; 0,0" dur="6s" repeatCount="indefinite"/>
      <g transform="translate(130, 200)">
        <ellipse cx="110" cy="140" rx="140" ry="130" fill="url(#agent1-grad)" filter="url(#glow-cyan)" opacity="0.3"/>
        <rect x="40" y="100" width="140" height="120" rx="16" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
        <rect x="60" y="120" width="100" height="60" rx="8" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
        <circle cx="80" cy="140" r="5" fill="#22d3ee" filter="url(#glow-cyan)">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="100" cy="140" r="5" fill="#22d3ee" filter="url(#glow-cyan)">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
        <circle cx="120" cy="140" r="5" fill="#22d3ee" filter="url(#glow-cyan)">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="1s"/>
        </circle>
        <line x1="60" y1="195" x2="160" y2="195" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
        <rect x="80" y="205" width="60" height="4" rx="2" fill="rgba(34,211,238,0.1)"/>

        <rect x="55" y="35" width="110" height="65" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
        <ellipse cx="85" cy="60" rx="14" ry="12" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
        <ellipse cx="135" cy="60" rx="14" ry="12" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
        <circle cx="85" cy="60" r="6" fill="#22d3ee" filter="url(#glow-cyan)">
          <animate attributeName="rx" values="6;2;6" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="135" cy="60" r="6" fill="#22d3ee" filter="url(#glow-cyan)">
          <animate attributeName="rx" values="6;2;6" dur="4s" repeatCount="indefinite" begin="2s"/>
        </circle>
        <line x1="110" y1="35" x2="110" y2="15" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
        <circle cx="110" cy="13" r="4" fill="#22d3ee" filter="url(#glow-cyan)">
          <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
        </circle>

        <!-- Animated left arm -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="-10,30,120;10,30,120;-10,30,120" dur="3s" repeatCount="indefinite"/>
          <rect x="15" y="110" width="25" height="12" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
          <rect x="-5" y="105" width="22" height="22" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
          <path d="M 0,110 L -8,100" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.8">
            <animate attributeName="d" values="M 0,110 L -8,100;M 0,110 L -8,108;M 0,110 L -8,100" dur="3s" repeatCount="indefinite"/>
          </path>
          <path d="M 15,110 L 23,100" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.8">
            <animate attributeName="d" values="M 15,110 L 23,100;M 15,110 L 23,108;M 15,110 L 23,100" dur="3s" repeatCount="indefinite"/>
          </path>
        </g>
        <!-- Animated right arm -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="10,180,130;-10,180,130;10,180,130" dur="2.5s" repeatCount="indefinite"/>
          <rect x="185" y="120" width="25" height="12" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
          <circle cx="212" cy="126" r="8" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="1"/>
          <line x1="220" y1="126" x2="260" y2="140" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6">
            <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
          </line>
        </g>
        <rect x="65" y="220" width="20" height="40" rx="6" fill="#0f172a" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
        <rect x="135" y="220" width="20" height="40" rx="6" fill="#0f172a" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
        <rect x="55" y="255" width="40" height="10" rx="4" fill="#0f172a" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
        <rect x="125" y="255" width="40" height="10" rx="4" fill="#0f172a" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
        <text x="110" y="285" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700" letter-spacing="1" opacity="0.9">AGENT</text>
        <text x="110" y="298" text-anchor="middle" fill="#64748b" font-size="8" letter-spacing="0.5">STORING · WRITE</text>
      </g>
    </g>

    <!-- ── AGENT 2: THE RETRIEVING AGENT ── -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0; 0,-8; 0,0" dur="7s" repeatCount="indefinite"/>
      <g transform="translate(700, 200)">
        <ellipse cx="110" cy="140" rx="140" ry="130" fill="url(#agent2-grad)" filter="url(#glow-emerald)" opacity="0.3"/>
        <rect x="40" y="100" width="140" height="120" rx="16" fill="#0f172a" stroke="#34d399" stroke-width="1.5" opacity="0.95"/>
        <rect x="60" y="120" width="100" height="60" rx="8" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
        <circle cx="80" cy="140" r="5" fill="#34d399" filter="url(#glow-emerald)">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
        </circle>
        <circle cx="100" cy="140" r="5" fill="#34d399" filter="url(#glow-emerald)">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.8s"/>
        </circle>
        <circle cx="120" cy="140" r="5" fill="#34d399" filter="url(#glow-emerald)">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.3s"/>
        </circle>
        <line x1="60" y1="195" x2="160" y2="195" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
        <rect x="80" y="205" width="60" height="4" rx="2" fill="rgba(52,211,153,0.1)"/>

        <path d="M 60,95 L 55,50 Q 55,35 70,35 L 150,35 Q 165,35 165,50 L 160,95 Z" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
        <rect x="70" y="52" width="80" height="22" rx="10" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
        <line x1="110" y1="52" x2="110" y2="74" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
        <rect x="75" y="60" width="70" height="3" rx="2" fill="#34d399" filter="url(#glow-emerald)" opacity="0.6">
          <animate attributeName="y" values="55;72;55" dur="3s" repeatCount="indefinite"/>
        </rect>
        <line x1="90" y1="35" x2="85" y2="16" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
        <line x1="130" y1="35" x2="135" y2="16" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
        <circle cx="85" cy="14" r="3" fill="#34d399" filter="url(#glow-emerald)">
          <animate attributeName="r" values="3;4.5;3" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="135" cy="14" r="3" fill="#34d399" filter="url(#glow-emerald)">
          <animate attributeName="r" values="3;4.5;3" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
        </circle>

        <!-- Left arm -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="-10,30,120;10,30,120;-10,30,120" dur="2.5s" repeatCount="indefinite"/>
          <rect x="15" y="120" width="25" height="12" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" opacity="0.8"/>
          <path d="M -5,115 Q -15,126 -5,137" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.7"/>
          <circle cx="-5" cy="126" r="3" fill="#34d399" filter="url(#glow-emerald)" opacity="0.4">
            <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
          </circle>
        </g>
        <!-- Right arm -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="10,180,140;-10,180,140;10,180,140" dur="3.5s" repeatCount="indefinite"/>
          <rect x="185" y="130" width="22" height="12" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" opacity="0.8"/>
          <circle cx="210" cy="136" r="7" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1"/>
        </g>
        <rect x="65" y="220" width="20" height="40" rx="6" fill="#0f172a" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
        <rect x="135" y="220" width="20" height="40" rx="6" fill="#0f172a" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
        <rect x="55" y="255" width="40" height="10" rx="4" fill="#0f172a" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
        <rect x="125" y="255" width="40" height="10" rx="4" fill="#0f172a" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
        <text x="110" y="285" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700" letter-spacing="1" opacity="0.9">AGENT</text>
        <text x="110" y="298" text-anchor="middle" fill="#64748b" font-size="8" letter-spacing="0.5">RETRIEVING · READ</text>
      </g>
    </g>

    <!-- ── CENTRAL BRAIN / MEMORY CORE ── -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0; 0,6; 0,0" dur="5s" repeatCount="indefinite"/>
      <g transform="translate(550, 320)">
        <ellipse cx="0" cy="0" rx="100" ry="90" fill="url(#brain-grad)" filter="url(#glow-violet)">
          <animate attributeName="rx" values="100;115;100" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="90;105;90" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="0" cy="0" rx="75" ry="65" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5" filter="url(#brain-noise)"/>
        <g opacity="0.4">
          <line x1="-30" y1="-20" x2="20" y2="-30" stroke="#a78bfa" stroke-width="0.5"/>
          <line x1="20" y1="-30" x2="40" y2="0" stroke="#a78bfa" stroke-width="0.5"/>
          <line x1="40" y1="0" x2="25" y2="25" stroke="#a78bfa" stroke-width="0.5"/>
          <line x1="-40" y1="-25" x2="0" y2="-40" stroke="#c4b5fd" stroke-width="0.5"/>
          <line x1="0" y1="-40" x2="35" y2="-10" stroke="#c4b5fd" stroke-width="0.5"/>
          <line x1="35" y1="-10" x2="10" y2="30" stroke="#c4b5fd" stroke-width="0.5"/>
          <line x1="-45" y1="10" x2="-15" y2="-15" stroke="#a78bfa" stroke-width="0.5"/>
          <line x1="-15" y1="-15" x2="30" y2="15" stroke="#a78bfa" stroke-width="0.5"/>
          <line x1="30" y1="15" x2="0" y2="35" stroke="#a78bfa" stroke-width="0.5"/>
        </g>
        <circle cx="-30" cy="-20" r="5" fill="#a78bfa" filter="url(#glow-violet)">
          <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="20" cy="-30" r="4" fill="#c4b5fd">
          <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
        <circle cx="40" cy="0" r="5" fill="#a78bfa" filter="url(#glow-violet)">
          <animate attributeName="r" values="5;7;5" dur="3.5s" repeatCount="indefinite" begin="1s"/>
        </circle>
        <circle cx="25" cy="25" r="3.5" fill="#c4b5fd">
          <animate attributeName="r" values="3.5;5.5;3.5" dur="2s" repeatCount="indefinite" begin="1.5s"/>

        <text x="0" y="58" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700" letter-spacing="2">MEMORY CORE</text>
