body { background: #020617; overflow: hidden; height: 100vh; }
.concept-visual {
    position: relative; width: 100vw; height: calc(100vh - 56px);

.grid { position: absolute; inset: 0;

    background-size: 40px 40px; pointer-events: none; animation: gridPulse 8s ease-in-out infinite; }
@keyframes gridPulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
.particle-field { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.particle-field span { position:absolute; border-radius:50%; opacity:0; animation:floatParticle linear infinite; }
.concept-title { position:absolute; top:3%; left:0; right:0; text-align:center; color:#e2e8f0; font-size:clamp(9px,1.2vw,13px); font-weight:600; letter-spacing:4px; text-transform:uppercase; opacity:0.5; z-index:10; pointer-events:none; }
.concept-title span { color:#22d3ee; }
svg.concept-svg { position:absolute; inset:0; width:100%; height:100%; display:block; }
.concept-legend { position:absolute; bottom:clamp(8px,2vh,24px); left:50%; transform:translateX(-50%); display:flex; gap:clamp(10px,2vw,28px); background:rgba(15,23,42,0.85); padding:clamp(6px,1vh,10px) clamp(12px,2vw,22px); border-radius:10px; border:1px solid #1e293b; backdrop-filter:blur(8px); z-index:10; flex-wrap:wrap; justify-content:center; }
.concept-legend-item { display:flex; align-items:center; gap:clamp(4px,0.8vw,8px); color:#94a3b8; font-size:clamp(7px,0.9vw,10px); font-weight:500; letter-spacing:0.3px; white-space:nowrap; }
.concept-legend-item .dot { width:clamp(6px,0.9vw,10px); height:clamp(6px,0.9vw,10px); border-radius:50%; flex-shrink:0; }
.concept-legend-item .dot.cyan { background:#22d3ee; box-shadow:0 0 8px rgba(34,211,238,0.5); }
.concept-legend-item .dot.emerald { background:#34d399; box-shadow:0 0 8px rgba(52,211,153,0.5); }
.concept-legend-item .dot.violet { background:#a78bfa; box-shadow:0 0 8px rgba(167,139,250,0.5); }
.concept-legend-item .dot.orange { background:#fb923c; box-shadow:0 0 8px rgba(251,146,60,0.5); }
@keyframes floatParticle {
    0%{transform:translateY(0) scale(0);opacity:0}
    10%{opacity:0.8}
    20%{transform:translateY(-30px) scale(1);opacity:0.6}
    80%{opacity:0.4}
    100%{transform:translateY(-120px) scale(0);opacity:0}
}
